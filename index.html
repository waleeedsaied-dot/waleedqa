// ── HOOKS ──────────────────────────────────────────────────────────
function useReveal(threshold=0.1){
  const ref = useRef(null);
  const [visible,setVisible] = useState(false);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){setVisible(true);obs.disconnect();}
    },{threshold});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[]);
  return [ref,visible];
}

function RevealBox({children,delay=0,className=""}){
  const [ref,vis] = useReveal();
  return (
    <div ref={ref} className={className} style={{
      opacity: vis?1:0, transform: vis?"translateY(0)":"translateY(28px)",
      transition:`opacity 0.65s ease ${delay}ms, transform 0.65s ease ${delay}ms`
    }}>{children}</div>
  );
}

// ── FOOTER BAR — Avatar Popup ─────────────────────────────────────
function FooterBar({avatarOpen,setAvatarOpen,page,navigate}){
  const popupRef = useRef(null);
  const [imgHover,setImgHover] = useState(false);

  // Close on outside click or Escape
  useEffect(()=>{
    const h=(e)=>{ if(avatarOpen && popupRef.current && !popupRef.current.contains(e.target)) setAvatarOpen(false); };
    const k=(e)=>{ if(e.key==="Escape") setAvatarOpen(false); };
    document.addEventListener("mousedown",h);
    document.addEventListener("keydown",k);
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("keydown",k);};
  },[avatarOpen]);

  return(
    <div style={{
      position:"fixed",bottom:0,left:0,right:0,zIndex:200,
      background:"rgba(8,8,8,0.95)",backdropFilter:"blur(20px)",
      borderTop:"1px solid rgba(255,255,255,0.07)",
      padding:"14px 48px",
      display:"flex",alignItems:"center",justifyContent:"space-between"
    }}>
      {/* Left: brand + certs */}
      <div style={{display:"flex",alignItems:"center",gap:20}}>
        <span className="bebas" style={{fontSize:"0.9rem",letterSpacing:"3px",color:"#9a8870"}}>WALEED HASSAN</span>
        <div style={{display:"flex",gap:10}}>
          {["ISTQB","CAST™","CBAP™","15+ YRS"].map(c=>(

      </div>

      {/* Center: nav */}
      <div style={{display:"flex",gap:8}}>
        {[["profile","Profile"],["career","Experience"]].map(([p,l])=>(
          <button key={p} onClick={()=>navigate(p)} style={{
            fontFamily:"'Inter',sans-serif",fontWeight:500,fontSize:"0.82rem",
            color:page===p?"#e8893a":"rgba(240,236,230,0.45)",
            background:"none",border:"none",cursor:"pointer",padding:"6px 14px",
            transition:"color 0.2s"
          }}>{l}</button>
        ))}
      </div>

      {/* Right: Avatar button + popup */}
      <div style={{position:"relative"}} ref={popupRef}>
        <button onClick={()=>setAvatarOpen(o=>!o)} style={{
          width:42,height:42,borderRadius:"50%",overflow:"hidden",
          border:`2px solid ${avatarOpen?"#e8893a":"rgba(200,96,26,0.35)"}`,
          cursor:"pointer",padding:0,transition:"border-color 0.3s",
          boxShadow:avatarOpen?"0 0 16px rgba(200,96,26,0.5)":"none"
        }}
          onMouseEnter={()=>setImgHover(true)} onMouseLeave={()=>setImgHover(false)}>
          <img src={PHOTO} alt="WH" style={{
            width:"100%",height:"100%",objectFit:"cover",objectPosition:"top",
            filter:imgHover||avatarOpen?"grayscale(0%) brightness(1)":"grayscale(100%) brightness(0.85)",
            transition:"filter 0.5s ease"
          }}/>
        </button>

        {/* Avatar Popup — spec: 320px, 32px padding, glass-neon */}
        {avatarOpen && (
          <div className="glass-dark neon-amber" style={{
            position:"absolute",bottom:52,right:0,
            width:320,padding:32,
            animation:"fadeUp 0.3s ease both",
            boxShadow:"0 0 40px rgba(200,96,26,0.15),0 24px 72px rgba(0,0,0,0.8)"

            <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:24}}>
              <div style={{width:56,height:56,borderRadius:"50%",overflow:"hidden",border:"2px solid rgba(200,96,26,0.4)",flexShrink:0}}>
                <img src={PHOTO} alt="WH" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"top"}}/>
              </div>
              <div>
                <p className="bebas" style={{fontSize:"1.3rem",color:"#f0ece6",letterSpacing:"1px",lineHeight:1}}>Waleed Hassan</p>
                <p className="mono" style={{fontSize:"0.62rem",color:"#e8893a",letterSpacing:"1.5px",textTransform:"uppercase",marginTop:4}}>QA Manager · BA</p>
                <p style={{fontSize:"0.78rem",color:"#9a8870",marginTop:2}}>Alexandria, Egypt</p>
              </div>
            </div>

            {/* Quick Stats */}
            <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"16px 0",marginBottom:20}}>
              <p className="mono" style={{fontSize:"0.6rem",letterSpacing:"2.5px",textTransform:"uppercase",color:"#9a8870",marginBottom:14}}>QA Quick Stats</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                {[["15+","Years"],["1000s","Tests Run"],["3","Countries"]].map(([val,sub])=>(
                  <div key={sub} style={{textAlign:"center"}}>
                    <div className="bebas" style={{fontSize:"1.6rem",color:"#e8893a",lineHeight:1}}>{val}</div>
                    <p className="mono" style={{fontSize:"0.56rem",color:"#9a8870",letterSpacing:"1px",textTransform:"uppercase",marginTop:3}}>{sub}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Contacts */}
            <div style={{marginBottom:20}}>
              {[
                {label:"Email",val:"waleeedsaied@gmail.com",href:"mailto:waleeedsaied@gmail.com"},
                {label:"Phone",val:"+20 150 116 5507",href:"tel:+201501165507"},
              ].map(c=>(
                <div key={c.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <span className="mono" style={{fontSize:"0.6rem",letterSpacing:"1.5px",textTransform:"uppercase",color:"#6a5840"}}>{c.label}</span>
                  <a href={c.href} style={{fontSize:"0.8rem",color:"#c89258",textDecoration:"none"}}>{c.val}</a>
                </div>
              ))}
            </div>

            {/* LinkedIn CTA — high-contrast primary orange */}
            <a href="https://linkedin.com/in/waleed-hassan-459663154" target="_blank" style={{
              display:"flex",alignItems:"center",justifyContent:"center",gap:8,
              background:"#c8601a",color:"#fff",
              fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:"0.88rem",
              padding:"13px 20px",textDecoration:"none",
              boxShadow:"0 0 20px rgba(200,96,26,0.4)",
              transition:"all 0.3s"
            }}>
              🔗 Connect on LinkedIn
            </a>
          </div>
        )}
      </div>
    </div>
  );
}
